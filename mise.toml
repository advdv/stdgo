[tools]
# golangci-lint must be listed before go so it takes precedence on PATH
# over any binary installed via `go install`
golangci-lint = "latest"
"npm:@ampcode/cli" = { version = "latest", npm_args = "--ignore-scripts=false" }
go = "latest"
amp = "latest"
mage = "latest"
node = "22"
buf = "latest"
claude = "latest"
